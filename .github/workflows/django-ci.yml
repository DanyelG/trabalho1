name: CI - Testes de Qualidade

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Testes de Integração
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: trabalho0

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: trabalho0/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar migrações
        run: python manage.py makemigrations accounts

      - name: Aplicar migrações
        run: python manage.py migrate

      - name: Verificar configurações do projeto
        run: python manage.py check

      - name: Rodar testes de integração
        run: python manage.py test accounts --verbosity=2